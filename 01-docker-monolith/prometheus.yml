# prometheus.yml
global:
  scrape_interval: 15s      # як часто збирати метрики
  evaluation_interval: 15s  # як часто перевіряти правила алертів

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["localhost:9093"]  # у моноліті всі поруч -> localhost

rule_files:
  - "alert.rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node"
    static_configs:
      - targets: ["localhost:9100"]

 # - job_name: "cadvisor"
 #   static_configs:
 #    - targets: ["localhost:8080"]

  - job_name: "nginx"
    static_configs:
      - targets: ["web-exp:9113"]  # sidecar exporter