# alert.rules.yml
groups:
  - name: basic
    rules:
      - alert: TargetDown
        expr: up == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Target {{ $labels.job }} лежить уже хвилину"

      - alert: WebServerDown
        expr: nginx_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Nginx лежить хвилину"